name: SECUREID CI/CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend-and-face-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db
      JWT_SECRET_KEY: test-secret-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: ./backend
        run: |
          pytest -q

      - name: Install face service dependencies
        working-directory: ./face-service
        run: |
          pip install -r requirements.txt

      - name: Run face service tests
        working-directory: ./face-service
        run: |
          pytest tests/test_face_utils.py -q

  build-docker-images:
    runs-on: ubuntu-latest
    needs: backend-and-face-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t secureid-backend ./backend

      - name: Build face-service image
        run: docker build -t secureid-face-service ./face-service

      - name: Build frontend image
        run: docker build -t secureid-frontend ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build-docker-images
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Placeholder deploy
        run: |
          echo "Deploy step placeholder. Integrate with AWS / ECS / EC2 as needed."
